<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    {% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'expenses/style.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand fw-bold fs-5" href="{% url 'expense-list' %}">
    <i class="bi bi-wallet2 me-2"></i>
    <span style="color:#f97316;">Expense</span>
    <span style="color:#60a5fa;">Tracker</span>
</a>
    <div class="d-flex align-items-center gap-3">
        {% if user.is_authenticated %}
            <span class="text-white-50 small">Hi, {{ user.username }}</span>
            <a href="{% url 'add-expense' %}" class="btn btn-success btn-sm">
                + Add Expense
            </a>
            <form method="POST" action="{% url 'logout' %}" style="margin: 0;">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-light btn-sm">
        Logout
    </button>
</form>
        {% endif %}
    </div>
</nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
