{% extends 'expenses/base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="delete-card">
            <div class="delete-title">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete
            </div>
            <p style="color:#94a3b8;" class="mb-1">Are you sure you want to delete:</p>
            <h5 class="my-3" style="color:#e2e8f0;">{{ expense.title }}</h5>
            <p style="color:#64748b;">₹{{ expense.amount }} — {{ expense.date }}</p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <button type="submit" class="btn btn-action-delete px-4 py-2">
                        <i class="bi bi-trash me-1"></i>Yes, Delete
                    </button>
                    <a href="{% url 'expense-list' %}" class="btn btn-outline-blue px-4 py-2">
                        <i class="bi bi-arrow-left me-1"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
